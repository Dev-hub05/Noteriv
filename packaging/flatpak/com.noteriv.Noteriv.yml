id: com.noteriv.Noteriv
runtime: org.gnome.Platform
runtime-version: '47'
sdk: org.gnome.Sdk
command: noteriv

finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  - --device=dri
  - --share=network
  - --filesystem=home

modules:
  - name: noteriv
    buildsystem: simple
    build-commands:
      - ar x *.deb
      - tar -xf data.tar.gz
      - install -Dm755 usr/bin/noteriv /app/bin/noteriv
      - install -Dm644 usr/share/icons/hicolor/128x128/apps/noteriv.png
        /app/share/icons/hicolor/128x128/apps/com.noteriv.Noteriv.png
      - install -Dm644 usr/share/icons/hicolor/256x256@2/apps/noteriv.png
        /app/share/icons/hicolor/256x256/apps/com.noteriv.Noteriv.png
      - install -Dm644 com.noteriv.Noteriv.desktop /app/share/applications/com.noteriv.Noteriv.desktop
      - install -Dm644 com.noteriv.Noteriv.metainfo.xml /app/share/metainfo/com.noteriv.Noteriv.metainfo.xml
    sources:
      - type: file
        url: https://github.com/thejacedev/Noteriv/releases/download/v2.1.1/Noteriv_2.1.1_amd64.deb
        sha256: 40fb14f626b2702036d5425567ab9ce28e7a977d9e09fb681afac9aa98cd7133
      - type: file
        path: com.noteriv.Noteriv.desktop
      - type: file
        path: com.noteriv.Noteriv.metainfo.xml
